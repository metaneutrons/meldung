# =============================================================================
# Meldung — Configuration
# =============================================================================
# Copy this file to meldung.config.yaml and adjust to your environment.
# All sections are documented below.
# =============================================================================

# -----------------------------------------------------------------------------
# Branding
# -----------------------------------------------------------------------------
# Customize the appearance for your organization.
# Colors are hex. Place logo/favicon assets in the public/ folder.
# Brand values are injected as CSS variables at runtime (no rebuild to rebrand).
branding:
  orgName: 'Hochschule Hannover'
  # logoUrl: "/logo.svg"           # web logo (SVG or raster), omit for text-only
  # logoDarkUrl: "/logo-dark.svg"  # optional dark-mode logo variant
  # logoPdfUrl: "/logo.png"        # raster (PNG/JPG) for the PDF — SVG cannot be embedded
  # favicon: "/favicon.ico"        # optional browser-tab icon
  primaryColor: '#38b449' # brand color (hex)
  # brandForeground: "#ffffff"     # optional text-on-brand color (auto-contrast otherwise)
  accentColor: '#333333' # secondary accent (hex)
  # appTitle: "IT-Sicherheitsmeldung"             # optional browser-tab + PDF title
  # appDescription: "Sicherheitsvorfälle melden"  # optional meta description

# -----------------------------------------------------------------------------
# Locale
# -----------------------------------------------------------------------------
# Default language for the UI. Supported: de, en, es, fr, tr, it, ru, uk
defaultLocale: de

# -----------------------------------------------------------------------------
# Delivery Channels
# -----------------------------------------------------------------------------
# Configure how incident reports are delivered after submission.
# Any number of channels can be enabled simultaneously — they run in parallel.
# If all are disabled, the report is only available as PDF download.
# Secrets (passwords, tokens, webhook secret) are best set via env (.env.example).
delivery:
  # --- Email Channel ---
  email:
    enabled: false
    smtp:
      host: 'smtp.example.com'
      port: 587
      secure: true
      user: 'noreply@example.com'
      pass: 'your-smtp-password'
      from: 'IT-Security <it-security@example.com>'
      recipients:
        - 'cert@example.com'
        - 'dpo@example.com'

  # --- Znuny / OTRS Channel ---
  znuny:
    enabled: false
    config:
      baseUrl: 'https://znuny.example.com/otrs/nph-genericinterface.pl/Webservice/Ticket%20REST%20API'
      username: 'api-user'
      password: 'your-api-password'
      queue: 'IT-Security'
      priority: '3 normal'
      state: 'new'

      # Mapping mode determines how form data is sent to Znuny:
      #   "minimal"        — Title + formatted plain text body
      #   "rich"           — Same as minimal + Dynamic Fields (requires fieldMappings)
      #   "json-attachment" — Short summary body + full form data as JSON attachment
      mappingMode: 'minimal'

      # Only used with mappingMode "rich":
      # Maps form field names to Znuny Dynamic Field names.
      # fieldMappings:
      #   incidentCategory: "DynamicField_IncidentCategory"
      #   incidentSubType: "DynamicField_IncidentSubType"
      #   functionalImpact: "DynamicField_FunctionalImpact"
      #   informationImpact: "DynamicField_InformationImpact"
      #   recoverability: "DynamicField_Recoverability"
      #   personalDataInvolved: "DynamicField_PersonalData"
      #   isGdprBreach: "DynamicField_GDPRBreach"

  # --- OTOBO Channel (OTRS fork) ---
  # Same GenericInterface REST connector as Znuny (Session + Ticket), so all
  # Znuny options above (mappingMode, fieldMappings, queue, ...) apply here too.
  # otobo:
  #   enabled: false
  #   config:
  #     baseUrl: 'https://otobo.example.com/otobo/nph-genericinterface.pl/Webservice/GenericTicketConnectorREST'
  #     username: 'api-user'
  #     password: 'your-api-password'   # prefer OTOBO_PASSWORD env
  #     queue: 'IT-Security'
  #     mappingMode: 'minimal'

  # --- Generic Webhook Channel ---
  # POSTs a stable, versioned JSON payload to any URL — wire it into n8n, Make,
  # Power Automate, a SOAR playbook, a SIEM, or a custom endpoint.
  # Payload: { version, event, referenceNumber, locale, submittedAt, data, report }
  # If 'secret' is set, the raw body is signed: header
  #   X-Meldung-Signature: sha256=<hex(hmac_sha256(secret, body))>
  # webhook:
  #   enabled: false
  #   config:
  #     url: 'https://hooks.example.com/incident'
  #     method: 'POST'              # POST (default) or PUT
  #     secret: 'shared-secret'     # prefer WEBHOOK_SECRET env; omit to disable signing
  #     includePdf: false           # add the PDF as base64 (pdfBase64) to the payload
  #     timeoutMs: 10000
  #     headers:                    # optional custom headers (e.g. an API key)
  #       Authorization: 'Bearer your-token'

  # --- Zammad Channel ---
  # Creates a ticket via the Zammad REST API (token auth). The report becomes the
  # first article; the PDF is attached when includePdf is true.
  # zammad:
  #   enabled: false
  #   config:
  #     baseUrl: 'https://zammad.example.com'
  #     token: 'your-api-token'          # prefer ZAMMAD_TOKEN env
  #     group: 'IT-Security'
  #     customerEmailFallback: 'cert@example.com'  # used when reporter gave no e-mail
  #     includePdf: true

# -----------------------------------------------------------------------------
# Persistence (optional)
# -----------------------------------------------------------------------------
# When enabled, submissions are stored locally for audit trail purposes.
# Driver "sqlite" uses a JSONL file at the given path.
persistence:
  enabled: false
  driver: sqlite
  connectionString: './data/meldung.jsonl'

# -----------------------------------------------------------------------------
# Authentication (optional)
# -----------------------------------------------------------------------------
# When enabled, the form requires SSO login before access.
# Set AUTH_ENABLED=true as environment variable to activate in middleware.
# Supports any OIDC-compatible provider (Keycloak, Azure AD, Shibboleth via proxy, etc.)
auth:
  enabled: false
  provider: oidc
  # issuer: "https://idp.example.com/realms/main"
  # clientId: "meldung"
  # clientSecret: "your-client-secret"

# -----------------------------------------------------------------------------
# Captcha (anti-bot)
# -----------------------------------------------------------------------------
# Invisible, self-hosted proof-of-work captcha (GDPR-clean — no third party).
# difficulty is the work factor: higher = more bot deterrence, slower client
# solve (still usually <1s). Set CAPTCHA_SECRET in env (see .env.example).
captcha:
  difficulty: 120000

# -----------------------------------------------------------------------------
# Reference Number
# -----------------------------------------------------------------------------
# Prefix for generated incident reference numbers.
# Format: {prefix}-{YYYYMMDD}-{4 hex chars}, e.g. INC-20260511-a3f2
referencePrefix: 'INC'
# -----------------------------------------------------------------------------
# Taxonomy Override (optional)
# -----------------------------------------------------------------------------
# Override the default ENISA RSIT incident taxonomy.
# If omitted, the built-in 9-category ENISA RSIT taxonomy is used.
# taxonomy:
#   - value: "malicious-code"
#     label: "Malicious Code"
#     entries:
#       - value: "ransomware"
#         label: "Ransomware"
#         description: "Malware that encrypts data and demands ransom"
#       - value: "trojan"
#         label: "Trojan"
#         description: "Malware disguised as legitimate software"

# -----------------------------------------------------------------------------
# Affected Systems Override (optional)
# -----------------------------------------------------------------------------
# Override the default systems checklist shown in step 5.
# If omitted, a generic default list is used.
# systems:
#   - "Campus-Management-System"
#   - "Lernplattform (Moodle)"
#   - "E-Mail-System"
#   - "Forschungsdatenbank"
#   - "VPN / Netzwerk"
#   - "Cloud-Dienste"
#   - "ERP / SAP"
